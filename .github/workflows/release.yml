name: Release

# Builds, signs (Developer ID), notarizes, staples, and attaches the .app
# (zipped) to the GitHub Release that triggered the run.
on:
  release:
    types: [published]

permissions:
  contents: write   # required to upload assets to the release

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.app || true

      - name: Import Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning

      - name: Build & sign app
        env:
          WHISPER_SIGN_ID: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: make build

      - name: Notarize & staple
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          echo "$API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/api_key.p8"

          # Zip preserving the bundle, submit, wait for the verdict.
          ditto -c -k --keepParent "build/LoopedWhisper.app" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/api_key.p8" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

          # Staple the ticket into the app so it runs offline without Gatekeeper prompts.
          xcrun stapler staple "build/LoopedWhisper.app"

      - name: Package final artifact
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent "build/LoopedWhisper.app" "LoopedWhisper-${VERSION}.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: LoopedWhisper-*.zip
