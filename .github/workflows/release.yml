name: Release

# Builds, signs (Developer ID), notarizes, staples, and attaches the .app
# (zipped) to the GitHub Release that triggered the run.
on:
  release:
    types: [published]

permissions:
  contents: write   # required to upload assets to the release

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (Swift 6+)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning

      - name: Build & sign app
        env:
          WHISPER_SIGN_ID: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: make build

      - name: Notarize & staple
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          echo "$API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/api_key.p8"

          # Zip preserving the bundle, submit, capture the submission id.
          ditto -c -k --keepParent "build/LoopedWhisper.app" "$RUNNER_TEMP/notarize.zip"
          SUBMIT_JSON="$(xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/api_key.p8" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait --output-format json)"
          echo "$SUBMIT_JSON"
          SUB_ID="$(echo "$SUBMIT_JSON" | python3 -c 'import json,sys;print(json.load(sys.stdin)["id"])')"
          STATUS="$(echo "$SUBMIT_JSON" | python3 -c 'import json,sys;print(json.load(sys.stdin)["status"])')"

          # Always print Apple's detailed log (shows exactly why if Invalid).
          echo "::group::notarytool log"
          xcrun notarytool log "$SUB_ID" \
            --key "$RUNNER_TEMP/api_key.p8" --key-id "$API_KEY_ID" --issuer "$API_ISSUER_ID" || true
          echo "::endgroup::"

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization status: $STATUS"; exit 1
          fi

          # Staple the ticket into the app so it runs offline without Gatekeeper prompts.
          xcrun stapler staple "build/LoopedWhisper.app"

      - name: Package final artifact
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent "build/LoopedWhisper.app" "LoopedWhisper-${VERSION}.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: LoopedWhisper-*.zip

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "No HOMEBREW_TAP_TOKEN set — skipping tap update."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="$(shasum -a 256 "LoopedWhisper-${VERSION}.zip" | awk '{print $1}')"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/loopedautomation/homebrew-tap.git" tap
          mkdir -p tap/Casks
          cat > tap/Casks/looped-whisper.rb <<RUBY
          cask "looped-whisper" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/loopedautomation/whisper/releases/download/v#{version}/LoopedWhisper-#{version}.zip"
            name "Looped Whisper"
            desc "Local voice transcription for macOS — on-device Whisper models"
            homepage "https://github.com/loopedautomation/whisper"

            depends_on macos: ">= :sonoma"
            depends_on arch: :arm64

            app "LoopedWhisper.app"

            zap trash: [
              "~/Library/Application Support/Looped Whisper",
              "~/Library/Preferences/com.looped.whisper.plist",
            ]
          end
          RUBY

          cd tap
          git config user.name "looped-bot"
          git config user.email "bot@looped.sh"
          git add Casks/looped-whisper.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date."
          else
            git commit -m "looped-whisper ${VERSION}"
            git push
          fi
